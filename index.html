<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pzk Clicker Neon</title>
    <meta name="theme-color" content="#0a0f1e">
    <meta name="color-scheme" content="dark">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <h1 class="neon-title">PZK<span>CLICKER</span></h1>
        
        <div class="neon-balance">
            <span id="coinBalance">0</span>
            <span class="currency">PZK</span>
        </div>

        <div class="coin-wrapper">
            <div class="neon-coin" id="clickableCoin">
                <div class="coin-inner"></div>
            </div>
        </div>

        <div class="boosts-panel">
            <h2 class="neon-subtitle">⚡ НЕОН БУСТЫ ⚡</h2>
            <div class="boosts-grid">
                <div class="neon-boost-item" id="boostAfk">
                    <div class="boost-glow"></div>
                    <h3>💤 AFK</h3>
                    <p>+1/сек</p>
                    <div class="boost-price" id="afkPrice">10</div>
                    <button class="neon-btn" data-boost="afk">АКТИВИРОВАТЬ</button>
                </div>
                <div class="neon-boost-item" id="boostDouble">
                    <div class="boost-glow"></div>
                    <h3>2️⃣ ДВОЙНОЙ</h3>
                    <p>×2 клик</p>
                    <div class="boost-price" id="doublePrice">50</div>
                    <button class="neon-btn" data-boost="double">АКТИВИРОВАТЬ</button>
                </div>
                <div class="neon-boost-item" id="boostRandom">
                    <div class="boost-glow"></div>
                    <h3>🎲 РАНДОМ</h3>
                    <p>бонус 50 клик</p>
                    <div class="boost-price" id="randomPrice">100</div>
                    <button class="neon-btn" data-boost="random">АКТИВИРОВАТЬ</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="neon-background"></div>
    <script src="script.js"></script>
</body>
</html>
