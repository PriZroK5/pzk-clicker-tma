<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pzk Clicker</title>
    <meta name="theme-color" content="#0a0f1e">
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="title">PZK<span>CLICKER</span></h1>
        
        <div class="balance">
            <span id="coinBalance">0</span>
            <span class="currency">PZK</span>
        </div>

        <div class="coin-wrapper">
            <div class="coin" id="clickableCoin"></div>
        </div>

        <div class="boosts-panel">
            <h2 class="subtitle">БУСТЫ</h2>
            <div class="boosts-grid">
                <div class="boost-item" id="boostAfk">
                    <h3>💤 AFK</h3>
                    <p>+1/сек</p>
                    <div class="boost-price" id="afkPrice">10</div>
                    <button class="buy-btn" data-boost="afk">Купить</button>
                </div>
                <div class="boost-item" id="boostDouble">
                    <h3>2️⃣ Двойной</h3>
                    <p>×2 клик</p>
                    <div class="boost-price" id="doublePrice">50</div>
                    <button class="buy-btn" data-boost="double">Купить</button>
                </div>
                <div class="boost-item" id="boostRandom">
                    <h3>🎲 Рандом</h3>
                    <p>50 кликов</p>
                    <div class="boost-price" id="randomPrice">100</div>
                    <button class="buy-btn" data-boost="random">Купить</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
